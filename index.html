<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caeser Cipher Encrypt/Decrypt</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100">
    <div class="m-6 max-w-md mx-auto bg-white p-6 rounded shadow">
      <form id="form" class="space-y-4">

        <div>
          <label for="messageInput" class="block text-sm font-medium text-gray-700">
            Message to encrypt/decrypt
          </label>
          <textarea
            id="messageInput"
            rows="4"
            class="mt-1 block w-full border border-gray-300 rounded px-3 py-2"
          ></textarea>
        </div>

        <div>
          <label for="shiftInput" class="block text-sm font-medium text-gray-700">
            Shift value
          </label>
          <input
            type="number"
            id="shiftInput"
            value="3"
            class="mt-1 block w-full border border-gray-300 rounded px-3 py-2"
          />
        </div>

        <div class="flex space-x-2">
          <button
            type="button"
            id="encrypt"
            class="bg-gray-500 text-white py-2 px-4 rounded hover:bg-gray-800"
          >
            Encrypt
          </button>
          <button
            type="button"
            id="decrypt"
            class="bg-gray-500 text-white py-2 px-4 rounded hover:bg-gray-800"
          >
            Decrypt
          </button>
        </div>

        <button
          type="submit"
          id="submit"
          class="w-full bg-gray-500 text-white py-2 px-4 rounded hover:bg-gray-800"
        >
          Submit
        </button>
      </form>

      <p id="output" class="mt-4 p-4 rounded text-white font-semibold"></p>
    </div>
    <script src="index.js"></script>
  </body>
</html>
